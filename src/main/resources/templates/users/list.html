<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des utilisateurs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>

<div class="container mt-5 mb-5">

    <div class="users-pro-wrapper">

        <div class="users-pro-header">
            <div class="users-pro-title-zone">
                <div class="users-pro-icon">
                    <i class="bi bi-people-fill"></i>
                </div>
                <div>
                    <h1 class="users-pro-title mb-1">Gestion des utilisateurs</h1>
                    <p class="users-pro-subtitle mb-0">
                        Consultez, recherchez et administrez les comptes utilisateurs.
                    </p>
                </div>
            </div>

            <a th:href="@{/home}" class="btn btn-pro-return">
                <i class="bi bi-arrow-left-short"></i>
                Retour accueil
            </a>
        </div>

        <div class="users-pro-card">

            <div class="users-pro-toolbar">
                <form th:action="@{/admin/users}" method="get" class="users-pro-search-form">
                    <div class="users-pro-search-box">
                        <i class="bi bi-search users-pro-search-icon"></i>
                        <input type="text"
                               name="keyword"
                               class="form-control users-pro-search-input"
                               placeholder="Rechercher par prénom, nom ou email..."
                               th:value="${keyword}">
                    </div>

                    <button type="submit" class="btn btn-users-pro-search">
                        Rechercher
                    </button>
                </form>
            </div>

            <div class="users-pro-table-wrap">
                <div class="table-responsive">
                    <table class="table users-pro-table align-middle mb-0">

                        <thead>
                        <tr>
                            <th>Utilisateur</th>
                            <th>Email</th>
                            <th>Rôle</th>
                            <th>Statut</th>
                            <th class="text-center">Gestion</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="5" class="text-center users-pro-empty py-5">
                                <div class="users-pro-empty-icon mb-2">
                                    <i class="bi bi-person-x"></i>
                                </div>
                                <div>Aucun utilisateur trouvé.</div>
                            </td>
                        </tr>

                        <tr th:each="u : ${users}">
                            <td>
                                <div class="user-identity">
                                    <div class="user-avatar">
                                        <span th:text="${#strings.substring(u.firstName,0,1) + #strings.substring(u.lastName,0,1)}">US</span>
                                    </div>
                                    <div>
                                        <div class="user-fullname fw-semibold"
                                             th:text="${u.firstName + ' ' + u.lastName}"></div>
                                        <div class="user-mini-info">Compte utilisateur</div>
                                    </div>
                                </div>
                            </td>

                            <td>
                                <span class="user-email" th:text="${u.email}"></span>
                            </td>

                            <td>
                                <span class="users-role-badge" th:text="${u.role}"></span>
                            </td>

                            <td>
                                <span class="users-status-active" th:if="${u.enabled}">
                                    <i class="bi bi-check-circle-fill"></i> Actif
                                </span>
                                <span class="users-status-disabled" th:unless="${u.enabled}">
                                    <i class="bi bi-x-circle-fill"></i> Désactivé
                                </span>
                            </td>

                            <td class="text-center">
                                <div class="users-actions-stack">

                                    <!-- Modifier rôle -->
                                    <form th:action="@{/admin/users/{id}/role(id=${u.id})}"
                                          method="post"
                                          class="users-inline-form">

                                        <input type="hidden" name="page" th:value="${currentPage}">
                                        <input type="hidden" name="keyword" th:value="${keyword}">

                                        <select name="role" class="form-select form-select-sm user-role-select-pro">
                                            <option th:each="r : ${roles}"
                                                    th:value="${r}"
                                                    th:text="${r}"
                                                    th:selected="${r == u.role}">
                                            </option>
                                        </select>

                                        <button type="submit" class="btn btn-user-pro-edit btn-sm">
                                            <i class="bi bi-pencil-square"></i>
                                            Modifier
                                        </button>
                                    </form>

                                    <div class="users-inline-actions">
                                        <!-- Activer / Désactiver -->
                                        <form th:action="@{/admin/users/{id}/enabled(id=${u.id})}"
                                              method="post">

                                            <input type="hidden" name="page" th:value="${currentPage}">
                                            <input type="hidden" name="keyword" th:value="${keyword}">
                                            <input type="hidden" name="enabled" th:value="${!u.enabled}">

                                            <button type="submit"
                                                    class="btn btn-sm"
                                                    th:classappend="${u.enabled} ? 'btn-user-pro-warning' : 'btn-user-pro-success'"
                                                    th:text="${u.enabled ? 'Désactiver' : 'Activer'}">
                                            </button>
                                        </form>

                                        <!-- Supprimer -->
                                        <form th:action="@{/admin/users/{id}/delete(id=${u.id})}"
                                              method="post"
                                              onsubmit="return confirm('Supprimer cet utilisateur ?')">

                                            <input type="hidden" name="page" th:value="${currentPage}">
                                            <input type="hidden" name="keyword" th:value="${keyword}">

                                            <button type="submit" class="btn btn-sm btn-user-pro-delete">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>

                                </div>
                            </td>
                        </tr>
                        </tbody>

                    </table>
                </div>
            </div>

            <nav th:if="${totalPages > 1}" class="mt-4 px-3 pb-3">
                <ul class="pagination justify-content-center custom-pagination">

                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/users(page=${currentPage - 1}, keyword=${keyword})}">
                            Précédent
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/admin/users(page=${i}, keyword=${keyword})}"
                           th:text="${i + 1}">
                        </a>
                    </li>

                    <li class="page-item"
                        th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/users(page=${currentPage + 1}, keyword=${keyword})}">
                            Suivant
                        </a>
                    </li>

                </ul>
            </nav>

        </div>

    </div>

</div>

</body>
</html>
