<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mot de passe oublié</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="auth-bg">

<div class="container py-5">

    <div class="row justify-content-center align-items-center">

        <div class="col-lg-5 col-md-7">

            <div class="auth-card">

                <div class="auth-card-body">

                    <div class="auth-icon">
                        <i class="bi bi-shield-lock"></i>
                    </div>

                    <h2 class="auth-title">
                        Mot de passe oublié
                    </h2>

                    <p class="auth-subtitle">
                        Saisissez votre email pour recevoir un code OTP et réinitialiser votre mot de passe.
                    </p>

                    <form th:action="@{/auth/forgot-password}" method="post">

                        <div class="auth-input-group mb-3">

                            <label class="auth-label">Email</label>

                            <div class="auth-input-wrapper">
                                <i class="bi bi-envelope auth-input-icon"></i>

                                <input
                                        type="email"
                                        name="email"
                                        class="form-control auth-input"
                                        placeholder="ex : nom@email.com"
                                        required
                                >
                            </div>

                        </div>

                        <button type="submit" class="btn btn-auth-primary w-100">

                            <i class="bi bi-send"></i>
                            Envoyer le code OTP

                        </button>

                    </form>

                    <div class="auth-footer">

                        <a th:href="@{/auth/login}" class="auth-link">

                            <i class="bi bi-arrow-left"></i>
                            Retour à la connexion

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
