<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-bg">

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-7">
            <div class="card register-card">
                <div class="card-body">
                    <div class="brand-icon">
                        👤
                    </div>

                    <h3 class="register-title mb-1">Créer un compte</h3>
                    <p class="register-subtitle">Renseignez les informations ci-dessous.</p>

                    <form th:action="@{/auth/register}"
                          th:object="${form}"
                          method="post"
                          class="needs-validation" novalidate>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Prénom</label>
                                <input class="form-control" th:field="*{firstName}" placeholder="Votre prénom" required>
                                <div class="invalid-feedback">Prénom obligatoire.</div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Nom</label>
                                <input class="form-control" th:field="*{lastName}" placeholder="Votre nom" required>
                                <div class="invalid-feedback">Nom obligatoire.</div>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Email</label>
                                <input class="form-control" th:field="*{email}" type="email" placeholder="nom@email.com" required>
                                <div class="invalid-feedback">Email valide obligatoire.</div>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Mot de passe</label>
                                <input class="form-control" th:field="*{password}" type="password" minlength="6" placeholder="Minimum 6 caractères" required>
                                <div class="invalid-feedback">Minimum 6 caractères.</div>
                            </div>
                        </div>

                        <button class="btn btn-register w-100 mt-4" type="submit">
                            Créer le compte
                        </button>
                    </form>

                    <div class="text-center mt-4 back-link">
                        <a class="text-decoration-none" th:href="@{/auth/login}">
                            ← Retour à la connexion
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (() => {
        'use strict'
        const forms = document.querySelectorAll('.needs-validation')
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>
</body>
</html>
