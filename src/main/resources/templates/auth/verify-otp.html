<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vérification OTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="auth-bg">

<div class="container py-5">

    <div class="row justify-content-center align-items-center">

        <div class="col-lg-5 col-md-7">

            <div class="auth-card">

                <div class="auth-card-body">

                    <div class="auth-icon">
                        <i class="bi bi-shield-check"></i>
                    </div>

                    <h2 class="auth-title">
                        Vérification du code OTP
                    </h2>

                    <p class="auth-subtitle">
                        Entrez le code que nous avons envoyé à votre adresse email.
                    </p>

                    <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>

                    <form th:action="@{/auth/verify-otp}" method="post">

                        <input type="hidden" name="email" th:value="${email}">

                        <div class="auth-input-group mb-3">

                            <label class="auth-label">
                                Code OTP
                            </label>

                            <div class="auth-input-wrapper">

                                <i class="bi bi-key auth-input-icon"></i>

                                <input
                                        type="text"
                                        name="otp"
                                        class="form-control auth-input text-center"
                                        placeholder="Ex : 123456"
                                        maxlength="6"
                                        required
                                >

                            </div>

                        </div>

                        <button type="submit" class="btn btn-auth-primary w-100">

                            <i class="bi bi-check-circle"></i>
                            Vérifier le code

                        </button>

                    </form>

                    <div class="auth-footer">

                        <a th:href="@{/auth/login}" class="auth-link">

                            <i class="bi bi-arrow-left"></i>
                            Retour à la connexion

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
