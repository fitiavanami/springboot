<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestion des demandes CIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="container py-5">

    <div class="demande-wrapper">

        <!-- En-tête -->
        <div class="demande-header mb-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h2 class="demande-title mb-1">Gestion des demandes de CIN</h2>
                <p class="demande-subtitle mb-0">Créer et suivre les demandes liées aux citoyens.</p>
            </div>

            <a th:href="@{/home}" class="btn btn-return">
                ← Retour à l'accueil
            </a>
        </div>

        <!-- Formulaire -->
        <div class="demande-card mb-4">
            <div class="card-body p-4">
                <h4 class="section-title mb-4">Nouvelle demande</h4>

                <form th:action="@{/demandes}" th:object="${newDemande}" method="post">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label for="demande" class="form-label demande-label">Type de demande</label>
                            <select id="demande" th:field="*{demande}" class="form-select demande-input">
                                <option value="">-- Choisir --</option>
                                <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                            </select>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('demande')}"
                                 th:errors="*{demande}"></div>
                        </div>

                        <div class="col-md-6">
                            <label for="citoyenId" class="form-label demande-label">Citoyen concerné</label>
                            <select id="citoyenId" th:field="*{citoyenId}" class="form-select demande-input">
                                <option value="">-- Choisir un citoyen --</option>
                                <option th:each="c : ${citoyens}"
                                        th:value="${c.id}"
                                        th:text="${c.nom + ' ' + c.prenom + ' - CIN: ' + c.cin}">
                                </option>
                            </select>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('citoyenId')}"
                                 th:errors="*{citoyenId}"></div>
                        </div>

                        <div class="col-12">
                            <button type="submit" class="btn btn-demand-add">
                                Ajouter la demande
                            </button>
                        </div>

                    </div>
                </form>
            </div>
        </div>

        <!-- Tableau -->
        <div class="demande-card">
            <div class="card-body p-4">
                <h4 class="section-title mb-4">Liste des demandes</h4>

                <div class="table-responsive">
                    <table class="table demande-table align-middle mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Numéro dossier</th>
                            <th>Type</th>
                            <th>Date dépôt</th>
                            <th>Citoyen</th>
                            <th>Agent responsable</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>

                        <tr th:if="${#lists.isEmpty(demandes)}">
                            <td colspan="8" class="text-center empty-state">
                                Aucune demande trouvée
                            </td>
                        </tr>

                        <tr th:each="d : ${demandes}">
                            <td th:text="${d.id}" class="fw-semibold"></td>
                            <td th:text="${d.numeroDossier}"></td>
                            <td th:text="${d.demande}"></td>
                            <td th:text="${#temporals.format(d.dateDepot, 'dd/MM/yyyy')}"></td>
                            <td th:text="${d.citoyen.nom + ' ' + d.citoyen.prenom}"></td>
                            <td th:text="${d.agentResponsable}"></td>
                            <td>
                                <span class="status-badge" th:text="${d.status}"></span>
                            </td>
                            <td>
                                <div class="d-flex gap-2 flex-wrap" th:if="${isAdmin}">

                                    <form th:action="@{/demandes/{id}/status(id=${d.id})}"
                                          method="post"
                                          class="d-flex gap-2 flex-wrap align-items-center">
                                        <select name="status" class="form-select form-select-sm status-select">
                                            <option th:each="e : ${etats}"
                                                    th:value="${e}"
                                                    th:text="${e}"
                                                    th:selected="${e == d.status}">
                                            </option>
                                        </select>
                                        <button type="submit" class="btn btn-sm btn-status-update">
                                            Modifier
                                        </button>
                                    </form>

                                    <form th:action="@{/demandes/{id}/delete(id=${d.id})}"
                                          method="post"
                                          onsubmit="return confirm('Supprimer cette demande ?')">
                                        <button type="submit" class="btn btn-sm btn-delete-demand">
                                            Supprimer
                                        </button>
                                    </form>

                                </div>

                                <span th:if="${!isAdmin}" class="text-muted small">Aucune action</span>
                            </td>
                        </tr>

                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
