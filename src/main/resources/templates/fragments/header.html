<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<div th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm app-navbar">
        <div class="container">
            <a class="navbar-brand" th:href="@{/home}">
                CIN
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-3">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/home}">Accueil</a>
                    </li>

                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
                    </li>

                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/users}">Users</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/demandes}">Demandes de CIN</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3 flex-wrap">
                    <span class="text-white small">
                        Connecté :
                        <strong sec:authentication="name"></strong>
                    </span>

                    <form th:action="@{/logout}" method="post" class="mb-0">
                        <button type="submit" class="btn btn-light btn-sm fw-semibold px-3">
                            Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
</div>

</body>
</html>
